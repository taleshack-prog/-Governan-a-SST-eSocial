# ==============================================================
# SST ESOCIAL GOV — Nginx Proxy Reverso
# Arquivo: nginx/nginx.conf
# Uso: produção — roteia /api → backend:8000, / → frontend:3000
# ==============================================================

upstream sst_api {
    server api:8000;
    keepalive 32;
}

upstream sst_frontend {
    server frontend:3000;
}

# Rate limiting — anti-abuso
limit_req_zone $binary_remote_addr zone=sst_api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=sst_auth_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/sst_access.log;
    error_log  /var/log/nginx/sst_error.log;

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ---- API ----
    location /api/ {
        limit_req zone=sst_api_limit burst=20 nodelay;

        proxy_pass         http://sst_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Rate limit especial para auth
    location /api/auth/token {
        limit_req zone=sst_auth_limit burst=5 nodelay;
        proxy_pass http://sst_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- FRONTEND ----
    location / {
        proxy_pass         http://sst_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok","service":"sst-esocial-gov-nginx"}';
        add_header Content-Type application/json;
    }
}
