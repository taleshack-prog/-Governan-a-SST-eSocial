# ==============================================================
# SST ESOCIAL GOV — Docker Compose
# Arquivo: docker-compose.yml
#
# PORTAS (anti-conflito com outros projetos):
#   Backend API  : host 8001 → container 8000
#   Frontend     : host 3001 → container 3000
#   PostgreSQL   : host 5433 → container 5432
#   Redis        : host 6380 → container 6379
#   MinIO API    : host 9001 → container 9000
#   MinIO Console: host 9002 → container 9001
# ==============================================================

version: "3.9"

services:

  # ---- BANCO DE DADOS ----
  db:
    image: pgvector/pgvector:pg16
    container_name: sst_esocial_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sst_esocial_db}
      POSTGRES_USER: ${POSTGRES_USER:-sst_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - sst_postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./database/triggers:/docker-entrypoint-initdb.d/triggers:ro
      - ./database/seeds:/docker-entrypoint-initdb.d/seeds:ro
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sst_user} -d ${POSTGRES_DB:-sst_esocial_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- REDIS (cache + filas Celery) ----
  redis:
    image: redis:7-alpine
    container_name: sst_esocial_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - sst_redis_data:/data
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- BACKEND FASTAPI ----
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sst_esocial_api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    ports:
      - "8003:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app/api:ro
      - ./ai-layer:/app/ai-layer:ro
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ---- CELERY WORKER (processamento IA assíncrono) ----
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sst_esocial_worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app/api:ro
      - ./ai-layer:/app/ai-layer:ro
    command: celery -A api.tasks.celery_app worker --loglevel=info --queues=sst_validacoes

  # ---- FRONTEND REACT ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: sst_esocial_frontend
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      VITE_API_URL: http://localhost:8001
    depends_on:
      - api

  # ---- MINIO (object storage para documentos) ----
  minio:
    image: minio/minio:latest
    container_name: sst_esocial_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-sst_minio_user}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - sst_minio_data:/data
    ports:
      - "9001:9000"
      - "9002:9001"

volumes:
  sst_postgres_data:
    name: sst_esocial_postgres_data
  sst_redis_data:
    name: sst_esocial_redis_data
  sst_minio_data:
    name: sst_esocial_minio_data

networks:
  default:
    name: sst_esocial_network
